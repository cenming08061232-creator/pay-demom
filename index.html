<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>支付宝付款二维码</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system}
body{background:#fff;padding:20px 15px}
.container{max-width:480px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 15px rgba(0,0,0,0.06)}
/* 顶部支付宝logo标题 */
.top-logo{display:flex;align-items:center;justify-content:center;padding:20px 0;gap:12px}
.top-logo .logo-box{width:60px;height:60px;background:#1677ff;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:36px;font-weight:bold}
.top-logo .title-text{font-size:42px;color:#222;font-weight:500}

.header-blue{background:#1677ff;color:#fff;text-align:center;padding:24px 16px}
.header-blue h2{font-size:38px;font-weight:bold}

.form-wrap{padding:20px}
.form-item{margin-bottom:18px}
.form-item label{display:block;font-size:14px;color:#333;margin-bottom:8px}
.form-item input{width:100%;height:46px;border:1px solid #e5e7eb;border-radius:10px;padding:0 14px;font-size:15px;outline:none}
.form-item input:focus{border-color:#1677ff}

/* 数量加减组件 */
.num-box{display:flex;align-items:center}
.num-btn{width:48px;height:46px;border:1px solid #e5e7eb;background:#f8f9fa;font-size:22px;border-radius:10px 0 0 10px;cursor:pointer}
.num-input{flex:1;height:46px;border-top:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;border-left:0;border-right:0;text-align:center;border-radius:0}
.num-add{border-radius:0 10px 10px 0}

.order-detail{padding:16px 20px;border-top:1px solid #eee;border-bottom:1px solid #eee}
.order-detail p{display:flex;justify-content:space-between;line-height:2.3;font-size:14px;color:#444}
.order-detail p span:first-child{color:#666}

/* 二维码区域 还原截图蓝色卡片样式 */
.qr-area{padding:0 15px 24px;background:#1677ff}
.qr-card{background:#fff;border-radius:16px;padding:20px 15px;text-align:center;margin-top:-8px}
.qr-box{width:260px;height:260px;border:1px solid #eee;border-radius:12px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;color:#999;background:#fafafa;font-size:14px}
.qr-user-name{font-size:20px;color:#333;margin-bottom:8px}
.qr-money-text{font-size:24px;color:#222;font-weight:bold}
.tip-text{font-size:13px;color:#fff;line-height:1.6;margin-top:12px}

/* 应付金额栏 */
.price-bar{background:#fff;color:#333;padding:12px 16px;text-align:center}
.price-bar h3{font-size:18px;font-weight:500}
.price-bar .total-price{font-size:42px;font-weight:bold;margin:12px 0}
.price-bar .order-no{font-size:13px;color:#888}

/* 支付按钮 */
.btn-area{padding:10px 20px 26px}
#alipay-jump{width:100%;height:50px;background:#1677ff;color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:500;cursor:pointer}
.desc-tip{text-align:center;margin-top:12px;font-size:12px;color:#999;line-height:1.7;padding:0 10px}
</style>
</head>
<body>
<div class="container">
    <!-- 顶部支付宝logo标题 -->
    <div class="top-logo">
        <div class="logo-box">支</div>
        <div class="title-text">支付宝</div>
    </div>

    <div class="header-blue">
        <h2>推荐使用支付宝</h2>
    </div>

    <!-- 蓝色二维码区域（匹配你的截图） -->
    <div class="qr-area">
        <div class="qr-card">
            <div class="qr-box">
                <!-- 替换为你的悟空投流收款码图片地址 -->
                <img src="https://qr.alipay.com/fkx1726007mth1pqtqgzw4f" width="240">
            </div>
            <div class="qr-user-name">A-悟空投流(*明)</div>
            <div class="qr-money-text">¥<span id="qrPrice">108.00</span></div>
        </div>
        <p class="tip-text">保存二维码，支付宝扫码付款</p>
    </div>

    <div class="form-wrap">
        <!-- 抖音号输入框（必填） -->
        <div class="form-item">
            <label>填写抖音账号</label>
            <input type="text" id="dyId" placeholder="请输入抖音ID/昵称">
        </div>

        <!-- 数量加减控件，单价固定108 -->
        <div class="form-item">
            <label>购买数量（单价108元）</label>
            <div class="num-box">
                <button class="num-btn" id="subBtn">-</button>
                <input class="num-input" id="countNum" value="1" readonly>
                <button class="num-btn num-add" id="addBtn">+</button>
            </div>
        </div>
    </div>

    <!-- 订单明细 -->
    <div class="order-detail">
        <p><span>服务项目</span><span>抖音配套服务</span></p>
        <p><span>单品单价</span><span>¥108.00</span></p>
        <p><span>购买份数</span><span id="showCount">1</span></p>
        <p><span>应付总额</span><span id="showTotal">¥108.00</span></p>
    </div>

    <!-- 应付金额展示 -->
    <div class="price-bar">
        <h3>应付金额</h3>
        <div class="total-price">¥<span id="allMoney">108.00</span></div>
        <div class="order-no">订单号：20260616000101</div>
    </div>

    <!-- 核心：点击跳转支付宝App按钮 -->
    <div class="btn-area">
        <button id="alipay-jump">一键跳转支付宝付款 ¥108.00</button>
        <p class="desc-tip">演示页面仅模拟唤起支付宝App<br>无真实支付订单，无法完成扣款，仅学习使用</p>
    </div>
</div>

<script>
// 固定单品单价
const priceSingle = 108;
// 模拟订单号
const orderSn = "20260616000101";

// 页面元素获取
const countNum = document.getElementById('countNum');
const subBtn = document.getElementById('subBtn');
const addBtn = document.getElementById('addBtn');
const allMoney = document.getElementById('allMoney');
const showTotal = document.getElementById('showTotal');
const showCount = document.getElementById('showCount');
const jumpBtn = document.getElementById('alipay-jump');
const dyInput = document.getElementById('dyId');
const qrPrice = document.getElementById('qrPrice');

// 总价自动计算函数，修改数量所有金额同步刷新
function calcMoney(){
    let num = parseInt(countNum.value) || 1;
    let total = (num * priceSingle).toFixed(2);
    allMoney.innerText = total;
    showTotal.innerText = `¥${total}`;
    showCount.innerText = num;
    qrPrice.innerText = total;
    jumpBtn.innerText = `一键跳转支付宝付款 ¥${total}`;
}

// 减少数量（最低1份，不能为0）
subBtn.onclick = function(){
    let val = parseInt(countNum.value);
    if(val > 1){
        countNum.value = val - 1;
        calcMoney();
    }
}
// 增加数量
addBtn.onclick = function(){
    let val = parseInt(countNum.value);
    countNum.value = val + 1;
    calcMoney();
}

// 点击按钮跳转支付宝App核心逻辑
jumpBtn.onclick = function(){
    // 获取输入内容
    const dyAccount = dyInput.value.trim();
    const buyNum = parseInt(countNum.value);
    const totalAmt = (buyNum * priceSingle).toFixed(2);

    // 校验：未填写抖音号禁止跳转
    if(!dyAccount){
        alert("请先填写你的抖音账号！");
        return;
    }

    // alipays:// 协议，手机端唤起支付宝App（模拟支付链接，无真实订单）
    const alipaySchemeUrl = `alipays://platformapi/startapp?appId=20000067&url=https%3A%2F%2Fmock-pay-demo.com%3ForderNo%3D${orderSn}%26totalAmount%3D${totalAmt}%26subject%3D抖音服务-${dyAccount}`;
    
    // 执行跳转唤起支付宝
    window.location.href = alipaySchemeUrl;

    // 跳转后弹窗提示模拟说明
    setTimeout(()=>{
        alert(`订单信息\n抖音账号：${dyAccount}\n购买份数：${buyNum}\n应付金额：${totalAmt}元\n\n提示：当前为模拟演示链接，支付宝内无真实订单，无法完成付款。合法收款请开通支付宝商家服务。`);
    }, 700);
}

// 页面加载完成自动计算一次价格
calcMoney();
</script>
</body>
</html>
